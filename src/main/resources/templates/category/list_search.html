<!DOCTYPE html>

<html layout:decorate="~{layout}" xmlns:layout="http://www.w3.org/1999/xhtml" xmlns:th="http://www.w3.org/1999/xhtml" lang="ko"> <!-- layout.html 상속-->
<div layout:fragment="content">

  <div class="title_line">
    카테고리<span th:if="${word != null and word != ''}" th:text="|  ${word} ${search_cnt} 건|"></span>
  </div>

  <aside style="display: flex; align-items: center; justify-content: space-between;">
    <div th:replace="~{category/list_search_com::list_search_fragment}"></div>
    <div>
      <a style="font-size: 0.9em;" href="javascript: location.reload();">새로 고침</a>
    </div>
  </aside>

  <div class="menu_line" style="margin-top: 3px;"></div>

  <div class="flex_div_center" style="width: 90%; margin: 0px auto;">
    <form name="frm" method="post" action="/category/create" th:object="${categoryVO}">
      <input type="hidden" name="word" th:value="${word}">
      <input type="hidden" name="now_page" th:value="${now_page}">

      <div style="margin-right: 2px; width: 30%; float: left;">
        <input type="text" name="name" value="" autofocus="autofocus"
               class="form-control" style="width: 100%;" th:field="*{name}" placeholder="이름">
      </div>

      <div style="margin-right: 2px; width: 15%; float: left;">
        <input type="number" name="seqno" value="" min="1" max="1000000" step="1"
               class="form-control" style="width: 100%;" th:field="*{seqno}" placeholder="출력 순서">
      </div>

      <div style="margin-right: 2px; width: 20%; float: left;">
        <select id="visible" name="visible" class="form-control">
          <option value="출력 모드" selected>출력 모드</option>
          <option value="Y">Y</option>
          <option value="N">N</option>
        </select>
      </div>

      <div style="margin: 3px 2px 0 5px; width: 30%; display: flex; gap: 2px;">
        <button type="submit" class="btn btn-secondary btn-sm" style="background-color: #4D5050; color: white;">등록</button>
        <button type="reset" class="btn btn-secondary btn-sm" style="background-color: #777777; color: white;">취소</button>
      </div>
    </form>
  </div>

  <div th:replace="~{category/list_all_com::list_all_fragment}"></div>

</div>
</html>

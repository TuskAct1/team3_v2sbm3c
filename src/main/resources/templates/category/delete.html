<!DOCTYPE html>

<html layout:decorate="~{layout}" xmlns:layout="http://www.w3.org/1999/xhtml" xmlns:th="http://www.w3.org/1999/xhtml" lang="ko"> <!-- layout.html 상속-->
<div layout:fragment="content">
  <div class="title_line">카테고리 삭제</div>
  <aside style="display: flex; align-items: center; justify-content: space-between;">
    <div th:replace="~{category/list_search_com::list_search_fragment}"></div>
    <div>
      <a href="javascript: location.reload();">새로 고침</a>
      <span class="menu_divide">|</span>
      <a th:href="@{|/category/list_search|}">목록</a>
      <span class="menu_divide">|</span>
      <a th:href="@{|/category/update/${categoryVO.categoryno}?word=${word}&now_page=${now_page}|}">수정</a>
    </div>
  </aside>
  <div class="menu_line"></div>

  <form name="frm" method="post" th:action="|/category/delete/${categoryVO.categoryno}|" th:object="${categoryVO}">
    <input type="hidden" name="word" th:value="${word}"> <!--/* 값 유지 */-->

    <div class="msg_warning">
      카테고리를 삭제하면 복구 할 수 없습니다.<br>삭제하시려면 [삭제] 버튼을 클릭하세요.
    </div>
    <div style="width: 60%; margin: 0px auto; background-color: #DDDDDD;">
      <label>카테고리</label>: <span th:text="${categoryVO.name}"></span><br>
    </div>

    <div class="content_body_bottom">
      <button type="submit" class="btn btn-secondary btn-sm">삭제</button>
      <button type="button" th:attr="onclick=|location.href='/category/list_search'|" class="btn btn-secondary btn-sm">취소[목록]</button>
    </div>
  </form>

  <div th:replace="~{category/list_all_com::list_all_fragment}"></div>

</div>
</html>

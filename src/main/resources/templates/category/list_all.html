<!DOCTYPE html>

<html layout:decorate="~{layout}" xmlns:layout="http://www.w3.org/1999/xhtml" xmlns:th="http://www.w3.org/1999/xhtml" lang="ko"> <!-- layout.html 상속-->
<div layout:fragment="content">
  <div class="title_line">카테고리</div>
  <aside class="aside_right">
    <a href="javascript: location.reload();">새로 고침</a>
  </aside>
  <div class="menu_line"></div>

  <div class="flex_div_center" style="width: 90%; margin: 0px auto;">
    <form name="frm" method="post" action="/category/create" th:object="${categoryVO}">
      <div style="width: 100%; overflow: hidden; display: flex; flex-wrap: wrap; gap: 5px; align-items: center;">
        <div style="width: 32%;">
          <label>
            <input type="text" name="name" class="form-control" th:field="*{name}" placeholder="카테고리" autofocus>
          </label>
        </div>

        <div style="width: 13%;">
          <label>
            <input type="number" name="seqno" class="form-control" th:field="*{seqno}"
                   min="1" max="1000000" step="1" placeholder="출력 순서">
          </label>
        </div>

        <div style="width: 15%;">
          <label for="visible"></label>
          <select id="visible" name="visible" class="form-control" th:field="*{visible}">
            <option value="" disabled selected>출력 모드</option>
            <option value="Y">Y</option>
            <option value="N">N</option>
          </select>
        </div>

        <div style="width: 20%; display: flex; gap: 5px;">
          <button type="submit" class="btn btn-secondary btn-sm">등록</button>
          <button type="reset" class="btn btn-secondary btn-sm">취소</button>
        </div>
      </div>

    </form>
  </div>

  <!--/* list_all_com.html의 list_all_fragment를 include */-->
   <div th:replace="~{category/list_all_com::list_all_fragment}"></div>

</div>
</html>

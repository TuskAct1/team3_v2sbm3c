<!DOCTYPE html>

<html layout:decorate="~{layout}" xmlns:layout="http://www.w3.org/1999/xhtml" xmlns:th="http://www.w3.org/1999/xhtml"> <!-- layout.html 상속-->
<div layout:fragment="content">
  <div class='title_line'>
  </div>

  <aside class="aside_right">
    <a th:href="@{|./create|}">등록</a>
    <span class='menu_divide' >│</span>
    <a href="javascript:location.reload();">새로고침</a>
    <span class='menu_divide' >│</span>
    <a th:href="@{|./list_all|}">기본 목록형</a>    
  </aside>
  
  <div class='menu_line'></div>
  
  <form name='frm' method='post' th:object="${diaryVO}" action='./create' enctype="multipart/form-data">
    
    <div>
      <label>출력할 날짜</label>
      <input type='date' name='date' value='' required="required" 
            autofocus="autofocus" class="form-control" style='width: 100%;'>
    </div>
    
    <div>
      <label>달력에 출력될 레이블(제목)</label>
      <input type='title' name='title' value='1월 1일 휴강' required="required" 
              autofocus="autofocus" class="form-control" style='width: 100%;'>
    </div>
    
    <div>
       <label>내용</label>
       <textarea name='content' required="required" class="form-control" rows="12" style='width: 100%;'>화이팅!-!</textarea>
    </div>
    
    <div>
       <label>이미지</label>
       <input type='file1' class="form-control" name='file1MF' id='file1MF' value='' placeholder="파일 선택">
    </div>  
     
    <div>
       <label>패스워드</label>
       <input type='password' name='password' value='1234' required="required" 
                 class="form-control" style='width: 50%;'>
    </div> 
      
    <div class="content_body_bottom">
      <button type="submit" class="btn btn-secondary btn-sm">등록</button>
    </div>
  
  </form>

</div>

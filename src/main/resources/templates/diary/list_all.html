<!DOCTYPE html>

<html layout:decorate="~{layout}" xmlns:layout="http://www.w3.org/1999/xhtml" xmlns:th="http://www.w3.org/1999/xhtml" lang="ko"> <!-- layout.html 상속-->
<div layout:fragment="content">

  <div class='title_line'>일기</div>

  <aside class="aside_right">
    <a href="javascript:location.reload();">새로고침</a>
  </aside>

  <div class='menu_line'></div>

  <table class="table table-striped" style='width: 100%;'>
    <colgroup>
      <col style='width: 10%;'/>
      <col style='width: 90%;'/>
    </colgroup>
    <tr>
      <th class='th_bs'>파일</TH>
      <th class='th_bs'>제목</th>
    </tr>

    <tr th:each="diaryVO, status:${list}"
        th:attr="onclick=|location.href='/diary/read?diaryno=${diaryVO.diaryno}'|"
        style="cursor: pointer;">
      <td class='td_basic' th:text="${diaryVO.file1}"></td>
      <td class='td_left'>
        <span th:text="${diaryVO.title}" style="font-weight: bold;"></span><br>
        <span th:if="${diaryVO.content.length() > 160 }"
              th:text="|${diaryVO.content.substring(0, 160) }...|"></span>
        <span th:if="${diaryVO.content.length() <= 160 }"
              th:text="|${diaryVO.content}|"></span>

      </td>
    </tr>
  </table>

  <div class='bottom_menu'>
    <button type='button' onclick="location.reload();" class="btn btn-secondary btn-sm" style="background-color: #4D5050; color: white;">새로 고침</button>
  </div>

</div>
</html>

<!DOCTYPE html>

<html layout:decorate="~{layout}" xmlns:layout="http://www.w3.org/1999/xhtml" xmlns:th="http://www.w3.org/1999/xhtml"> <!-- layout.html 상속-->
<div layout:fragment="content">
    <div class='title_line'>
    </div>

    <aside class="aside_right">
        <a href="javascript:location.reload();">새로고침</a>
        <span class='menu_divide' >│</span>
        <a th:href="@{|./list_all|}">목록</a>
    </aside>

    <div class='menu_line'></div>

    <form name='frm' method='post' th:object="${diaryVO}" action='./update' enctype="multipart/form-data">
        <input type="hidden" name="diaryno" th:value="${diaryVO.diaryno}">

<!--        <div>-->
<!--            <label>출력할 날짜</label>-->
<!--            <input type='date' name='rdate' th:value='${diaryVO.rdate}' required="required"-->
<!--                   autofocus="autofocus" class="form-control" style='width: 100%;'>-->
<!--        </div>-->
        <div>
            <label>작성 날짜</label>
            <span name="rdate" th:text="${diaryVO.rdate}"></span>
        </div>

        <div>
            <label>달력에 출력될 레이블(제목)</label>
            <input type='text' name='title' th:value='${diaryVO.title}' required="required"
                   autofocus="autofocus" class="form-control" style='width: 100%;'>
        </div>

        <div>
            <label>내용</label>
            <textarea name='content' th:text='${diaryVO.content}' required="required" class="form-control" rows="12" style='width: 100%;'></textarea>
        </div>

        <div>
            <label>패스워드</label>
            <input type='password' name='password' value='1234' required="required"
                   class="form-control" style='width: 50%;'>
        </div>

        <div class="content_body_bottom">
            <button type="submit" class="btn btn-secondary btn-sm">수정</button>
            <button type="button" th:attr="onclick=|location.href='./list_all'|" class="btn btn-secondary btn-sm">목록</button>
        </div>

    </form>

</div>

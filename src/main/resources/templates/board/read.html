<!DOCTYPE html>

<html layout:decorate="~{layout}" xmlns:th="http://www.w3.org/1999/xhtml" xmlns:layout="http://www.w3.org/1999/xhtml"> <!-- layout.html 상속-->
<div layout:fragment="content">

    <div class='title_line'>
        <span th:text="${categoryVO.name}" class="title_line_text"></span >
        > 게시글 조회
    </div>

    <aside class="aside_right">
        <a th:href="@{|/board/delete?boardno=${boardVO.boardno}|}">삭제</a>
        <span class='menu_divide'>│</span>
        <a th:href="@{|/board/update?boardno=${boardVO.boardno}|}">수정</a>
        <span class='menu_divide'>│</span>
        <a href="javascript:location.reload();">새로고침</a>
    </aside>

    <div class='menu_line'></div>

    <fieldset class="fieldset_basic">
        <ul>
            <li class="li_none">
                <div style="width: 100%; word-break: break-all;">

                    <div th:if="${boardVO.file1.endsWith('jpg') or boardVO.file1.endsWith('png') or boardVO.file1.endsWith('gif') or boardVO.file1.endsWith('jpeg')}">
                        <img th:src="@{|/board/storage/${boardVO.file1saved}|}" style='width: 50%; float: left; margin-top: 0.5%; margin-right: 1%;'>
                    </div>

                    <span style="font-size: 1.5em; font-weight: bold;" th:text="${boardVO.title}"></span>
                    <span style="font-size: 1em;" th:text="${boardVO.rdate}"></span><br><br>
                    <div style="white-space: pre-wrap;">
                        <span th:text="${boardVO.content}"></span>
                    </div>
                </div>
            </li>
            <form name='frm' id="deleteForm" method='POST' action='/delete/boardno'>
                <div style='margin-top: 20px; clear: both;'>
                    <button type="submit" class="btn btn-secondary btn-sm">삭제</button>
                    <button type="button" onclick="history.back();" class="btn btn-secondary btn-sm">목록</button>
                </div>
            </form>
        </ul>
    </fieldset>

    <script>
        document.getElementById('deleteForm').addEventListener('submit', async function(e) {
            e.preventDefault(); // 폼의 기본 제출 막기

            // 확인 창 띄우기
            if (!confirm('정말 삭제하시겠습니까?')) {
                return; // 취소 시 아무것도 하지 않음
            }

            // 폼 데이터 준비
            const form = e.target;
            const formData = new FormData(form);

            try {
                const response = await fetch('/delete', {
                    method: 'POST',
                    body: formData,
                });

                if (response.ok) {
                    alert('삭제가 완료되었습니다.');
                    // 원하는 페이지로 이동 (예: 목록 페이지)
                    window.location.href = '/list'; // 실제 목록 URL로 변경
                } else {
                    alert('삭제에 실패했습니다.');
                }
            } catch (error) {
                alert('오류가 발생했습니다.');
                console.error(error);
            }
        });
    </script>
</div>

</html>

<!DOCTYPE html>

<html layout:decorate="~{layout}" xmlns:th="http://www.w3.org/1999/xhtml" xmlns:layout="http://www.w3.org/1999/xhtml"> <!-- layout.html 상속-->
<div layout:fragment="content">
    <div class="title_line">게시글 수정</div>

    <aside class="aside_right">
        <a th:href="@{|/board/list_all|}">목록</a>
        <span class="menu_divide"> | </span>
        <a href="javascript: location.reload();">새로 고침</a>
    </aside>

    <div class="menu_line"></div>

    <div style="width: 50%; margin: 0px auto;">
        <form name='frm' method='post' th:object="${boardVO}" action='/board/update'>
            <input type="hidden" name="categoryno" th:value="${categoryVO.categoryno}">
            <input type="hidden" name="boardno" th:value="${boardVO.boardno}">

            <div>
                <label>제목</label>
                <input type='text' name='title' th:value='${boardVO.title}' required="required"
                       autofocus="autofocus" class="form-control" style='width: 100%;'>
            </div>
            <div>
                <label>내용</label>
                <textarea name='content' required="required" class="form-control" rows="12" style='width: 100%;'
                          th:text='${boardVO.content}'></textarea>
            </div>
            <div>
                <label>패스워드</label>
                <input type='password' name='passwd' th:value='${boardVO.passwd}' required="required"
                       class="form-control" style='width: 50%;'>
            </div>
            <div class="content_body_bottom">
                <button type="submit" class="btn btn-secondary btn-sm">등록</button>
                <button type="button" th:attr="onclick=|location.href='./list_all'|" class="btn btn-secondary btn-sm">목록</button>
            </div>

        </form>
    </div>
</div>
</html>
